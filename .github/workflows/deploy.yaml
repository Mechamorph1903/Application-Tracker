name: Deploy to Offerboard

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 159.223.164.161 >> ~/.ssh/known_hosts

      - name: Deploy to server
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@159.223.164.161 "
            cd /var/www/InternIn &&
            git pull origin main &&
            source venv/bin/activate &&
            pip install -r requirements.txt --quiet &&
            sudo systemctl restart internin &&
            echo 'Deploy complete'
          "